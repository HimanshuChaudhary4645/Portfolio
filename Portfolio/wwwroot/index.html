<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Himanshu | AI Portfolio</title>

    <style>

        .header-right a {
            margin-left: 10px;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            transition: 0.3s;
        }

            .header-right a:hover {
                transform: translateY(-2px);
            }

        .btn-orange {
            background: linear-gradient(135deg,#ff7b00,#ff3c00);
        }

        .btn-blue {
            background: #0077b5;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: auto;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), url("https://images.unsplash.com/photo-1519389950473-47ba0277781c") no-repeat center/cover;
        }

        main {
            width: 100%;
            max-width: 100%;
            min-height: 100vh;
            padding: 20px;
            gap: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            header a {
                background: linear-gradient(135deg, #ff7b00, #ff3c00);
                padding: 10px 30px;
                border-radius: 25px;
                text-decoration: none;
                color: #fff;
                text-align: center;
            }

        .header {
            height: 100px;
        }

        @media (max-width:768px) {
            .header-right {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
            header {
               
                flex-direction: column;
                gap: 15px;
                justify-content: center;
            }

            .header a {
                padding: 8px 20px;
                display: block;
                margin-bottom: 5px;
                text-align: center;
            }
            .search-box {
                flex-direction: column;
                gap: 10px;
                border-radius: 15px;
                padding: 10px;
            }

                .search-box input {
                    width: 100%;
                    padding: 10px;
                    font-size: 14px;
                }

                .search-box button {
                    width: 100%;
                    border-radius: 10px;
                    padding: 10px;
                }
        }

        .portfolio-body {
            min-height: calc(90vh - 100px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 750px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
        }

        .role {
            opacity: 0.8;
            margin: 10px 0 25px;
        }

        .search-box {
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 8px;
            transition: 0.3s;
        }

            .search-box input {
                flex: 1;
                border: none;
                background: transparent;
                color: white;
                padding: 12px;
                font-size: 15px;
                outline: none;
            }

            .search-box button {
                background: linear-gradient(135deg, #00c6ff, #0072ff);
                border: none;
                padding: 10px 20px;
                border-radius: 50px;
                color: white;
                cursor: pointer;
                transition: 0.3s;
            }

                .search-box button:hover {
                    transform: scale(1.05);
                }

        .suggestions {
            margin-top: 15px;
        }

            .suggestions button {
                margin: 5px;
                padding: 8px 14px;
                border-radius: 20px;
                border: none;
                background: rgba(255, 255, 255, 0.1);
                color: white;
                cursor: pointer;
                transition: 0.3s;
            }

                .suggestions button:hover {
                    background: #0072ff;
                }

        .chat-box {
            margin-top: 25px;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .message {
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            max-width: 85%;
        }

        .user {
            background: #0072ff;
            margin-left: auto;
        }

        .bot {
            background: rgba(255, 255, 255, 0.1);
        }

        .resume {
            position: absolute;
            top: 20px;
            right: 20px;
        }

            .resume a {
                background: #ff7b00;
                padding: 10px 18px;
                border-radius: 25px;
                text-decoration: none;
                color: white;
                transition: 0.3s;
            }

                .resume a:hover {
                    background: #ff5500;
                }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #00c6ff;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
            font-size: 20px;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid #00c6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        body.light {
            background: #f5f5f5;
            color: #111;
        }

            body.light .card {
                background: white;
                color: black;
            }

            body.light .search-box {
                background: #eee;
            }

            body.light .bot {
                background: #ddd;
            }

        .profile img {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px;
        }

        .badge {
            display: inline-block;
            margin-top: 5px;
            padding: 4px 10px;
            background: #00c6ff;
            border-radius: 20px;
            font-size: 12px;
        }
        .card {
            transition: 0.3s;
        }

            .card:hover {
                transform: translateY(-5px);
            }
        .message.bot::after {
            content: "|";
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }
    </style>

</head>

  <body>

      <main>
          <header class="header">
              <div><strong>Himanshu</strong></div>

              <div class="header-right">
                  <a href="/resume.pdf" download class="btn-orange">Download</a>
                  <a href="/resume.pdf" target="_blank" class="btn-orange">View</a>
                  <a href="https://www.linkedin.com/in/himanshu-chaudhary-9999014645/"
                     target="_blank"
                     class="btn-blue">
                      LinkedIn
                  </a>
                  <a href="https://github.com/HimanshuChaudhary4645" target="_blank" class="btn-blue">GitHub</a>
              </div>
          </header>
          <section class="portfolio-body">
              <div class="card">
                  <h1>Himanshu Chaudhary</h1>
                  <div class="role">
                      Full Stack .NET Developer | 4.6+ Years Experience
                  </div>
                  <div class="profile">
                      <img src="/images/profile.png" alt="Himanshu" />
                      <h2>Himanshu Chaudhary</h2>
                      <span class="badge">Available for hire</span>
                  </div>
                  <br />
                  <div class="search-box">
                      <input type="text"
                             id="query"
                             placeholder="Ask me anything about my skills, projects..." />
                      <button onclick="askAI()">Ask</button>
                  </div>

                  <div class="suggestions">
                      <button onclick="quickAsk('What are your skills?')">Skills</button>
                      <button onclick="quickAsk('Tell me about your projects')">
                          Projects
                      </button>
                      <button onclick="quickAsk('Why should we hire you?')">
                          Hire Me
                      </button>
                  </div>

                  <div class="chat-box" id="chatBox"></div>
              </div>
          </section>
      </main>


      <script>
          window.onload = function () {
              addMessage("Hi 👋 I'm Himanshu's AI assistant. Ask me anything about his skills, experience or projects.", "bot");
          };
          function addMessage(text, type) {
              let box = document.getElementById("chatBox");
              let msg = document.createElement("div");
              msg.className = "message " + type;
              msg.innerHTML = text;
              box.appendChild(msg);
              box.scrollTop = box.scrollHeight;
              return msg;
          }

          // Typing animation
          function typeText(element, text, speed = 20) {
              debugger
              let i = 0;
              element.innerHTML = "";
              let interval = setInterval(() => {
                  element.innerHTML += text.charAt(i);
                  i++;
                  if (i >= text.length) clearInterval(interval);
              }, speed);
          }

          function askAI() {
            
              let input = document.getElementById("query");
              let text = input.value;
              if (!text) return;

              addMessage(text, "user");
              input.value = "";

              // Loader
              let loaderMsg = addMessage('<div class="loader"></div>', "bot");

              fetch("api/ai/ask", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify({ question: text }),
              })
                  .then((res) => res.json())
                  .then((data) => {
                      let reply = data.choices[0].message.content;;

                      loaderMsg.innerHTML = "";
                      typeText(loaderMsg, reply); // ✨ typing effect
                  })
                  .catch(() => {
                      loaderMsg.innerHTML = "Error connecting to AI";
                  });
          }

          function quickAsk(text) {
              document.getElementById("query").value = text;
              askAI();
          }
          document.getElementById("query").addEventListener("keypress", function (e) {
              if (e.key === "Enter") {
                  askAI();
              }
          });

                  // Theme toggle

      </script>
  </body>
</html>
